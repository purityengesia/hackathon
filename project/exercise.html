<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexusHealth | Health & Wellness Portal</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1a535c">
    
    <style>
        :root {
            --primary: #1a535c;
            --secondary: #4ecdc4;
            --warning: #e76f51;
            --text: #ffffff;
            --light: #f7fff7;
            --bg: #0a0a0a;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            color: var(--text);
            background: var(--bg);
            min-height: 100vh;
            overflow-x: hidden;
        }

        header {
            background: var(--primary);
            padding: 5px 20px;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 4px 15px rgba(0,0,0,0.6);
        }

        .menu-board {
            display: flex;
            justify-content: center;
            gap: 20px;
            list-style: none;
            padding: 10px 0;
            margin: 0;
        }

        .menu-item {
            cursor: pointer;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            padding: 10px 25px;
            border-radius: 50px;
            color: white;
            border: 1px solid transparent;
        }

        .menu-item:hover {
            background: rgba(255,255,255,0.1);
            color: var(--secondary);
            border-color: var(--secondary);
            transform: translateY(-2px);
        }

        .portal-layout {
            display: grid;
            grid-template-columns: 350px 1fr;
            gap: 40px;
            padding: 50px 30px;
            max-width: 1300px;
            margin: 0 auto;
            align-items: start;
        }

        .doctor-sidebar {
            background: #151515;
            padding: 20px;
            border-radius: 24px;
            border: 1px solid #333;
            text-align: center;
            position: sticky;
            top: 100px;
        }

        .doctor-img {
            width: 100%;
            height: 300px;
            border-radius: 18px;
            object-fit: cover;
            filter: grayscale(20%);
            transition: 0.5s;
        }

        .doctor-sidebar:hover .doctor-img { filter: grayscale(0%); }

        .doctor-status {
            margin-top: 15px;
            font-weight: bold;
            color: var(--secondary);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .pulse {
            width: 10px;
            height: 10px;
            background: #2ecc71;
            border-radius: 50%;
            box-shadow: 0 0 0 rgba(46, 204, 113, 0.4);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(46, 204, 113, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(46, 204, 113, 0); }
            100% { box-shadow: 0 0 0 0 rgba(46, 204, 113, 0); }
        }

        .welcome-msg h2 {
            font-size: 3.5rem;
            margin: 0;
            background: linear-gradient(to right, #fff, var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .card {
            background: #ffffff;
            color: #1a1a1a;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            animation: slideUp 0.4s ease-out;
            max-width: 750px;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card-content { padding: 40px; }

        /* Symptom Form Styling */
        .symptom-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin: 20px 0;
            text-align: left;
        }

        .symptom-item {
            background: #f1f3f5;
            padding: 12px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            cursor: pointer;
            font-size: 0.95rem;
        }

        .symptom-item input { margin-right: 12px; width: 18px; height: 18px; cursor: pointer; }

        textarea {
            width: 100%;
            height: 100px;
            padding: 15px;
            border-radius: 12px;
            border: 2px solid #eee;
            font-family: inherit;
            box-sizing: border-box;
            resize: none;
            margin-top: 10px;
        }

        .btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1rem;
            width: 100%;
            margin-top: 20px;
            transition: 0.2s;
        }

        .btn:hover { filter: brightness(1.2); transform: translateY(-2px); }

        #chat-history {
            height: 300px;
            overflow-y: auto;
            background: #f8f9fa;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            border: 1px solid #eee;
        }

        .chat-bubble { padding: 12px 18px; border-radius: 18px; font-size: 0.95rem; max-width: 80%; line-height: 1.4; }
        .dr-bubble { background: var(--secondary); color: var(--primary); align-self: flex-start; }
        .user-bubble { background: var(--primary); color: white; align-self: flex-end; }

        .modal-overlay {
            display: none;
            position: fixed;
            z-index: 2000;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(8px);
        }

        .modal-content {
            background: white;
            color: #333;
            margin: 10% auto;
            padding: 40px;
            width: 90%;
            max-width: 400px;
            border-radius: 24px;
            text-align: center;
        }

        input[type="text"] {
            width: 100%;
            padding: 14px;
            margin: 20px 0;
            border: 2px solid #eee;
            border-radius: 12px;
            box-sizing: border-box;
            font-size: 1rem;
        }

        @media (max-width: 1000px) {
            .portal-layout { grid-template-columns: 1fr; padding: 20px; }
            .doctor-sidebar { position: static; }
        }
    </style>
</head>
<body>

<header>
    <ul class="menu-board">
        <li class="menu-item" onclick="showContent('consult')">Consultation</li>
        <li class="menu-item" onclick="showContent('prevention')">Prevention</li>
        <li class="menu-item" onclick="showContent('symptom')">Symptom Report</li>
    </ul>
</header>

<div class="portal-layout">
    <div class="doctor-sidebar">
        <img src="https://images.unsplash.com/photo-1612349317150-e413f6a5b16d?auto=format&fit=crop&q=80&w=800" alt="Dr. Smith" class="doctor-img">
        <div class="doctor-status">
            <div class="pulse"></div>
            Dr. Alexander Smith
        </div>
        <p style="color: #888; font-size: 0.9rem;">General Practitioner<br>NexusHealth Lead</p>
    </div>

    <div class="display-area" id="display-area">
        <div class="welcome-msg">
            <h2>We Value Your<br>Health and Wellness.</h2>
            <p style="color: var(--secondary); font-size: 1.2rem; letter-spacing: 0.5px;">Select a service above to access your patient portal.</p>
        </div>
    </div>
</div>

<div id="userModal" class="modal-overlay">
    <div class="modal-content">
        <h3 id="modalTitle" style="margin-top:0">Secure Access</h3>
        <input type="text" id="userName" placeholder="Patient Full Name">
        <button class="btn" onclick="handleFormSubmission()">Connect</button>
        <button onclick="closeModal()" style="background:none; border:none; color:#999; cursor:pointer; margin-top:10px">Cancel</button>
    </div>
</div>

<script>
    let activeId = null;
    const displayArea = document.getElementById('display-area');

    const contentData = {
        consult: `
            <div class="card">
                <div class="card-content" id="card-inner">
                    <span style="color:var(--secondary); font-weight:bold">SECURE CHANNEL</span>
                    <h2>Live Consultation</h2>
                    <p>Start a real-time session with Dr. Smith.</p>
                    <button class="btn" onclick="openModal('consult', 'Text Chat')">💬 Open Chat</button>
                </div>
            </div>`,
        prevention: `
            <div class="card">
                <div class="card-content" id="card-inner">
                    <h2>Prevention Guide</h2>
                    <p>Access your personalized wellness roadmap.</p>
                    <button class="btn" style="background:var(--secondary); color:var(--primary)" onclick="openModal('guide', 'Health Guide')">View Guide</button>
                </div>
            </div>`,
        symptom: `
            <div class="card">
                <div class="card-content" id="card-inner">
                    <h2>Symptom Assessment</h2>
                    <p>Indicate your signs for immediate clinical review.</p>
                    <button class="btn" style="background:var(--warning)" onclick="openModal('report', 'Submit Report')">Begin Report</button>
                </div>
            </div>`
    };

    function showContent(type) { displayArea.innerHTML = contentData[type]; }

    function openModal(action, title) {
        activeId = action;
        document.getElementById('modalTitle').innerText = title;
        document.getElementById('userModal').style.display = 'block';
    }

    function closeModal() { document.getElementById('userModal').style.display = 'none'; }

    function handleFormSubmission() {
        const name = document.getElementById('userName').value;
        if (!name) return alert("Enter your name");
        closeModal();
        const inner = document.getElementById('card-inner');

        if (activeId === 'guide') {
            inner.innerHTML = `<h2>Welcome, ${name}</h2><p>Maintain consistent sleep and 20m of sunlight daily.</p><button class="btn" onclick="location.reload()">Return</button>`;
        } 
        else if (activeId === 'consult') {
            inner.innerHTML = `
                <div id="chat-history"><div class="chat-bubble dr-bubble"><b>Dr. Smith:</b> Hello ${name}, how can I help?</div></div>
                <div style="display:flex;gap:10px">
                    <input type="text" id="chatIn" placeholder="Reply..." style="margin:0;flex-grow:1">
                    <button class="btn" onclick="sendMsg('${name}')" style="margin:0;width:100px">Send</button>
                </div>`;
        } 
        else {
            // THE NEW SYMPTOM FORM
            inner.innerHTML = `
                <h2 style="margin-top:0">Clinical Sign Indicators</h2>
                <p>Patient: <b>${name}</b>. Please select your current signs:</p>
                <div class="symptom-grid">
                    <label class="symptom-item"><input type="checkbox" class="symp" value="Fever"> Fever</label>
                    <label class="symptom-item"><input type="checkbox" class="symp" value="Cough"> Cough</label>
                    <label class="symptom-item"><input type="checkbox" class="symp" value="Fatigue"> Fatigue</label>
                    <label class="symptom-item"><input type="checkbox" class="symp" value="Pain"> Local Pain</label>
                    <label class="symptom-item"><input type="checkbox" class="symp" value="Headache"> Headache</label>
                    <label class="symptom-item"><input type="checkbox" class="symp" value="Nausea"> Nausea</label>
                </div>
                <textarea id="sympDetails" placeholder="Additional details (onset, severity, etc.)"></textarea>
                <button class="btn" style="background:var(--warning)" onclick="submitFinalReport('${name}')">Submit to Doctor</button>
            `;
        }
        document.getElementById('userName').value = "";
    }

    function submitFinalReport(name) {
        const selected = Array.from(document.querySelectorAll('.symp:checked')).map(cb => cb.value);
        const inner = document.getElementById('card-inner');
        
        inner.innerHTML = `<h2 style="color:var(--primary)">Processing...</h2>`;

        setTimeout(() => {
            inner.innerHTML = `
                <div style="text-align:center">
                    <h2 style="color:#2ecc71">Report Delivered ✓</h2>
                    <p><b>Patient:</b> ${name}</p>
                    <p><b>Logged Signs:</b> ${selected.join(', ') || 'None selected'}</p>
                    <div style="background:#f8f9fa; padding:15px; border-radius:10px; margin:20px 0; font-size:0.9rem">
                        Dr. Smith has received your indicators. He will contact you shortly via the Consultation tab.
                    </div>
                    <button class="btn" onclick="location.reload()">Finish</button>
                </div>`;
        }, 1200);
    }

    function sendMsg(name) {
        const input = document.getElementById('chatIn');
        const history = document.getElementById('chat-history');
        if(!input.value.trim()) return;
        const div = document.createElement('div');
        div.className = 'chat-bubble user-bubble';
        div.innerText = input.value;
        history.appendChild(div);
        input.value = "";
        history.scrollTop = history.scrollHeight;
    }
</script>
</body>
</html>
